# cliff.toml — git-cliff config for postino
[changelog]
header = """
# Changelog

All notable changes to `il-postino` are documented here.
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and is generated automatically by [git-cliff](https://git-cliff.org) from
commit subjects on every tag.
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{%- else -%}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits -%}
- {{ commit.message | upper_first }}{% if commit.scope %} *(`{{ commit.scope }}`)*{% endif %}
{% endfor %}
{%- endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  # Strip trailing `Co-Authored-By:` lines from subject.
  { pattern = '\n+Co-Authored-By:.*', replace = "" },
]
commit_parsers = [
  { message = "^release:",      group = "Release" },
  { message = "^feat",          group = "Added" },
  { message = "^fix",           group = "Fixed" },
  { message = "^pkg",           group = "Packaging" },
  { message = "^ci",            group = "CI" },
  { message = "^docs",          group = "Docs" },
  { message = "^test",          group = "Tests" },
  { message = "^refactor",      group = "Refactored" },
  { message = "^chore",         group = "Misc" },
  { message = ".*",             group = "Misc" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
