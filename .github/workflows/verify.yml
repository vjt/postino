name: verify

# Reusable verify pipeline — full lint + type + unit/integration + e2e.
# Called by ci.yml on push/PR and by release.yml as a publish gate so a
# tag push cannot ship to PyPI unless the same job graph that ci.yml
# enforces is green on the tagged SHA.

on:
  workflow_call:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright

  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: postino_test
          MARIADB_USER: postino_test
          MARIADB_PASSWORD: postino_test_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Install mlmmj + manpage build tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mlmmj help2man mandoc
      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent && break
            sleep 2
          done
      - name: Grant privileges
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot <<'SQL'
          GRANT ALL ON postino_test.* TO 'postino_test'@'%';
          GRANT CREATE USER ON *.* TO 'postino_test'@'%';
          GRANT GRANT OPTION ON postino_test.* TO 'postino_test'@'%';
          FLUSH PRIVILEGES;
          SQL
      - name: Run tests
        env:
          POSTINO_TEST_DB_URL: mysql+pymysql://postino_test:postino_test_dev@127.0.0.1:3306/postino_test
        run: |
          set -eo pipefail
          pytest tests/ -q -rs --cov=src --cov-report=xml --cov-report=term 2>&1 | tee /tmp/pytest.out
          # Pytest 9 dropped the trailing "N passed, M skipped" line in
          # -q mode; sum the [N] multiplicities from `SKIPPED [N]` rows.
          skipped=$(awk '/^SKIPPED \[/ { gsub(/[^0-9]/, "", $2); sum += $2 } END { print sum+0 }' /tmp/pytest.out)
          if [ "$skipped" -gt 0 ]; then
            echo "::error::expected 0 skipped tests, got $skipped — every host-dep guard is supposed to be satisfied in CI"
            grep -E '^SKIPPED' /tmp/pytest.out | sort -u
            exit 1
          fi
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          use_oidc: true

  postinod-e2e-scim:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Build postinod image (warm Docker cache)
        run: docker compose -f tests/postinod_e2e/scim/docker-compose.yml build
      - name: Run e2e suite
        run: pytest tests/postinod_e2e/scim -v -m e2e
      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f tests/postinod_e2e/scim/docker-compose.yml logs

  postinod-e2e-lists:
    runs-on: ubuntu-latest
    needs: test
    env:
      POSTINO_E2E_DOCKER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Build agent + mta images (warm Docker cache)
        run: docker compose -f tests/postinod_e2e/lists/docker-compose.yml build
      - name: Run lists e2e suite
        run: pytest tests/postinod_e2e/lists -v -m e2e
      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f tests/postinod_e2e/lists/docker-compose.yml logs
