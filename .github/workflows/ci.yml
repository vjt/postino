name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright

  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: postino_test
          MARIADB_USER: postino_test
          MARIADB_PASSWORD: postino_test_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Install mlmmj
        # Required for tests/integration/test_mailing_list_service.py and
        # tests/e2e_cli/test_cli_list_e2e.py — they skipif mlmmj-sub is
        # absent. Without this step CI silently skipped 16 tests; the
        # postinod-e2e-lists job covers only the 3 compose-stack tests
        # and would not surface a regression in the in-process suites.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mlmmj
      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent && break
            sleep 2
          done
      - name: Grant privileges
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot <<'SQL'
          GRANT ALL ON postino_test.* TO 'postino_test'@'%';
          FLUSH PRIVILEGES;
          SQL
      - name: Run tests
        # `-rs` surfaces skip reasons in the log so the assert below can
        # count them. Zero skips is the contract: every host-dep guard
        # (mariadb, mlmmj) is satisfied in this job, so any skip means
        # CI is silently losing coverage — fail loudly instead.
        env:
          POSTINO_TEST_DB_URL: mysql+pymysql://postino_test:postino_test_dev@127.0.0.1:3306/postino_test
        run: |
          set -eo pipefail
          pytest tests/ -q -rs 2>&1 | tee /tmp/pytest.out
          skipped=$(sed -nE 's/.*([0-9]+) passed.*([0-9]+) skipped.*/\2/p' /tmp/pytest.out)
          : "${skipped:=0}"
          if [ "$skipped" -gt 0 ]; then
            echo "::error::expected 0 skipped tests, got $skipped — every host-dep guard is supposed to be satisfied in CI"
            grep -E '^SKIPPED' /tmp/pytest.out | sort -u
            exit 1
          fi

  postinod-e2e-scim:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Build postinod image (warm Docker cache)
        run: docker compose -f tests/postinod_e2e/scim/docker-compose.yml build
      - name: Run e2e suite
        run: pytest tests/postinod_e2e/scim -v -m e2e
      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f tests/postinod_e2e/scim/docker-compose.yml logs

  postinod-e2e-lists:
    runs-on: ubuntu-latest
    needs: test
    env:
      POSTINO_E2E_DOCKER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev,daemon]'
      - name: Build agent + mta images (warm Docker cache)
        run: docker compose -f tests/postinod_e2e/lists/docker-compose.yml build
      - name: Run lists e2e suite
        run: pytest tests/postinod_e2e/lists -v -m e2e
      - name: Capture compose logs on failure
        if: failure()
        run: docker compose -f tests/postinod_e2e/lists/docker-compose.yml logs
