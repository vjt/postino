name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright

  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: postino_test
          MARIADB_USER: postino_test
          MARIADB_PASSWORD: postino_test_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e '.[dev]'
      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent && break
            sleep 2
          done
      - name: Grant privileges
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -proot <<'SQL'
          GRANT ALL ON postino_test.* TO 'postino_test'@'%';
          FLUSH PRIVILEGES;
          SQL
      - name: Run tests
        env:
          POSTINO_TEST_DB_URL: mysql+pymysql://postino_test:postino_test_dev@127.0.0.1:3306/postino_test
        run: pytest tests/ -x -q
