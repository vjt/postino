name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # Re-run the full verify pipeline (lint, typecheck, unit+integration,
  # postinod e2e) on the tagged SHA. Without this gate a tag push would
  # ship to PyPI even when ci.yml on the same SHA is red — happened on
  # v0.7.0 (release-yml-no-test-gate gotcha).
  verify:
    uses: ./.github/workflows/verify.yml

  build-and-publish:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/il-postino/
    permissions:
      id-token: write  # OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyver=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "$tag" = "$pyver" ] || { echo "tag $tag != pyproject version $pyver" >&2; exit 1; }
      - run: python -m build
      - run: twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
