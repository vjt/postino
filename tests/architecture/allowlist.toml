# Architecture-test allowlist
#
# Keyed by `<test_id>` -> `<relpath>` -> `<lineno>` = `"WHY: <reason>"`.
# Entries here suppress a single (test, file, line) violation.
#
# Rules:
# - Every entry MUST start with `WHY:` followed by a one-line reason.
# - Renaming or moving a file invalidates its allowlist entries; a fresh
#   justification must be provided.
# - Prefer fixing violations over allowlisting; this file is the
#   compromise of last resort.

